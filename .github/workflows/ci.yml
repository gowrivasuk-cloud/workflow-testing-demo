name: n8n Workflow CI/CD

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev
      - staging

jobs:
  test-and-notify-n8n:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Jest unit tests
        run: npm run test:unit

      - name: Run HTTP mock tests
        run: npm run test:http-mock

      - name: Run snapshot tests
        run: npm run test:snapshot

      - name: Send CI result to n8n
        if: success()
        run: |
          curl -X POST "${{ secrets.N8N_CICD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "source": "github-actions",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commitSha": "${{ github.sha }}",
              "workflowName": "Order Status Workflow",
              "workflowId": "${{ secrets.N8N_WORKFLOW_ID }}",
              "jestUnitTest": "PASSED",
              "httpMockTest": "PASSED",
              "snapshotTest": "PASSED",
              "snapshotChanged": false,
              "managerApproval": "APPROVED",
              "requestedEnvironment": "staging",
              "n8nBaseUrl": "${{ secrets.N8N_BASE_URL }}",
              "n8nApiKey": "${{ secrets.N8N_API_KEY }}"
            }'
